<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="nav"></nav>

  <section id="hero" class="hero"></section>
  <section id="about" class="about"></section>
  <section id="projects" class="projects"></section>
  <section id="contact" class="contact"></section>

  <script>
    async function load(component) {
      const res = await fetch(`components/${component}.html`);
      document.querySelector(`.${component.replace('.html','')}`).outerHTML = await res.text();
    }
    load('nav'); load('hero'); load('about'); load('projects'); load('contact');
  </script>
</body>
</html>
